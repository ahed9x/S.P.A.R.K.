name: spark_app
description: SPARK — Smart Ping-Pong Automated Referee Kit (Tablet Dashboard)

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # WebSocket
  web_socket_channel: ^3.0.1

  # Local database
  sqflite: ^2.3.3+2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.4.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
